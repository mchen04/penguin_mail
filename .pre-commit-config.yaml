repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: frontend-lint
        name: Frontend ESLint
        entry: bash -c 'cd frontend && npx eslint .'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false

      - id: frontend-typecheck
        name: Frontend TypeScript
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false

      - id: backend-tests
        name: Backend Tests
        entry: bash -c 'cd backend && venv/bin/python -m pytest tests/ -q --tb=short'
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: frontend-tests
        name: Frontend Tests
        entry: bash -c 'cd frontend && npx vitest run'
        language: system
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/returntocorp/semgrep
    rev: v1.90.0
    hooks:
      - id: semgrep
        args:
          - --config=p/python
          - --config=p/django
          - --config=p/typescript
          - --config=p/react
          - --config=p/secrets
          - --error
        files: ^(backend|frontend)/
        exclude: ^(backend/penguin_mail/migrations|frontend/node_modules)/
        stages: [manual]
